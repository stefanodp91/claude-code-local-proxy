<app-modal-shell [open]="!!request" (dismissed)="stay()">
  @if (request) {
    <div class="d-flex align-items-center gap-2 mb-3 modal-header">
      <span class="fs-4">🗒</span>
      <span class="flex-grow-1" [innerHTML]="'planExit.title' | translate"></span>
    </div>

    <p class="modal-body mb-3">
      @if (request.planPath) {
        {{ "planExit.withPlan" | translate : { path: request.planPath } }}
      } @else {
        {{ "planExit.noPlan" | translate }}
      }
    </p>

    <div class="d-flex flex-wrap justify-content-end gap-2">
      <button class="btn-stay px-3 py-1 rounded-2" (click)="stay()">
        {{ "planExit.stay" | translate }}
      </button>
      <button class="btn-switch px-3 py-1 rounded-2" (click)="chooseAsk()">
        {{ "planExit.chooseAsk" | translate }}
      </button>
      <button class="btn-switch btn-switch--primary px-3 py-1 rounded-2 fw-semibold" (click)="chooseAuto()">
        {{ "planExit.chooseAuto" | translate }}
      </button>
    </div>
  }
</app-modal-shell>
